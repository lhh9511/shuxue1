<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI融合课 · 认识面积交互课件</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --mint: #dff5f0;
      --mint-deep: #c5ebe3;
      --teal: #4db6ac;
      --teal-dark: #3a9d94;
      --title-blue: #3d8fd9;
      --canvas-yellow: #fff9e6;
      --orange: #ff7043;
      --blue-shape: #42a5f5;
      --purple: #ab47bc;
      --pink: #f48fb1;
      --text: #37474f;
      --muted: #78909c;
      --card-radius: 24px;
      --font-display: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
      --font-body: "Noto Sans SC", system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      min-height: 100vh;
      color: var(--text);
      background: linear-gradient(160deg, #e8f8f5 0%, #dff5f0 40%, #d4efe8 100%);
      padding: 20px 16px 32px;
    }
    .page-header {
      max-width: 720px;
      margin: 0 auto 16px;
      padding: 0 8px;
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      color: var(--title-blue);
      font-weight: 400;
      line-height: 1.2;
    }
    .page-header p {
      font-family: var(--font-display);
      font-size: clamp(1.1rem, 3.5vw, 1.45rem);
      color: var(--title-blue);
      opacity: 0.95;
      margin-top: 4px;
    }
    .card {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border-radius: var(--card-radius);
      box-shadow: 0 12px 40px rgba(77, 182, 172, 0.18);
      padding: 24px 20px 28px;
    }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 18px;
      background: #f5f5f5;
      border-radius: 999px;
      padding: 4px;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }
    .tab {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: 1.05rem;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.25s;
    }
    .tab.active {
      background: var(--teal);
      color: #fff;
      box-shadow: 0 4px 12px rgba(77, 182, 172, 0.45);
    }
    .hint {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: none; }
    }
    /* 认识面积 */
    .colors {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .color-dot {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .color-dot:hover { transform: scale(1.08); }
    .color-dot.active {
      border-color: #2196f3;
      box-shadow: 0 0 0 3px #fff, 0 0 0 5px #2196f3;
    }
    .learn-canvas {
      background: var(--canvas-yellow);
      border-radius: 16px;
      padding: 28px 20px;
      min-height: 280px;
    }
    .shapes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px 16px;
      max-width: 520px;
      margin: 0 auto;
    }
    .shape-item {
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      padding: 8px;
      border-radius: 12px;
      transition: transform 0.15s;
    }
    .shape-item:hover { transform: scale(1.04); }
    .shape-item svg {
      width: 100%;
      max-width: 110px;
      height: auto;
      display: block;
    }
    .shape-item .shape-fill {
      stroke: #81d4fa;
      stroke-width: 3;
      transition: fill 0.2s;
    }
    .shape-item .shape-notch {
      fill: none;
      stroke: #81d4fa;
      stroke-width: 3;
    }
    /* 面积比较 */
    .compare-stage {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: flex-start;
      margin-bottom: 22px;
    }
    @media (max-width: 520px) {
      .compare-stage { gap: 8px; }
    }
    .compare-col {
      flex: 1;
      max-width: 280px;
      text-align: center;
    }
    .compare-counter {
      font-family: var(--font-display);
      font-size: 1.15rem;
      color: var(--text);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 30px;
    }
    .compare-counter .mini-shape {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .compare-counter .mini-shape.square { background: var(--orange); }
    .compare-counter .mini-shape.circle {
      background: var(--blue-shape);
      border-radius: 50%;
    }
    .compare-counter .mini-shape.triangle {
      background: var(--purple);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    }
    .compare-board {
      width: 100%;
      height: 128px;
      border: 3px solid #90a4ae;
      border-radius: 8px;
      background: #fff;
      padding: 6px;
      margin: 0 auto;
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .compare-board.drag-over {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(77, 182, 172, 0.35);
    }
    .tile-grid {
      width: 100%;
      height: 100%;
      display: grid;
    }
    .tile-grid.grid-a {
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 0;
    }
    .tile-grid.grid-b {
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 5px 6px;
    }
    .tile-slot {
      position: relative;
      min-width: 0;
      min-height: 0;
    }
    .tile-piece {
      position: absolute;
      inset: 0;
      pointer-events: none;
      animation: tilePop 0.2s ease;
    }
    @keyframes tilePop {
      from { transform: scale(0.6); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .tile-piece.square {
      background: var(--orange);
      border-radius: 1px;
    }
    .tile-grid.grid-a .tile-piece.square { inset: 0; }
    .tile-piece.circle {
      background: var(--blue-shape);
      border-radius: 50%;
      inset: 6%;
    }
    .tile-piece.triangle {
      background: var(--purple);
      clip-path: polygon(50% 4%, 96% 96%, 4% 96%);
      inset: 4%;
    }
    .compare-badge {
      display: inline-flex;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
    }
    .compare-badge.n1 { background: #ef5350; }
    .compare-badge.n2 { background: var(--blue-shape); }
    .shape-palette {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      margin-bottom: 24px;
      padding: 8px 0;
    }
    .palette-pick {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      border: 3px solid transparent;
      border-radius: 14px;
      padding: 8px;
      touch-action: none;
      transition: border-color 0.2s, transform 0.15s;
    }
    .palette-pick.active {
      border-color: #2196f3;
      background: rgba(33, 150, 243, 0.08);
    }
    .palette-pick.dragging { opacity: 0.45; cursor: grabbing; }
    .palette-pick .pick-shape { pointer-events: none; }
    .pick-shape {
      width: 46px;
      height: 46px;
    }
    .pick-shape.square { background: var(--orange); }
    .pick-shape.circle {
      background: var(--blue-shape);
      border-radius: 50%;
    }
    .pick-shape.triangle {
      background: var(--purple);
      clip-path: polygon(50% 6%, 94% 94%, 6% 94%);
    }
    .compare-result {
      text-align: center;
      font-family: var(--font-display);
      font-size: 1.05rem;
      color: var(--teal-dark);
      margin: -8px 0 14px;
      min-height: 1.4em;
    }
    .action-btns {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .action-btn {
      padding: 12px 22px;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: 1rem;
      cursor: pointer;
      border: 2px solid #b0bec5;
      background: #fff;
      color: var(--teal-dark);
      transition: all 0.2s;
    }
    .action-btn:hover {
      border-color: var(--teal);
      background: #e0f2f1;
    }
    .action-btn.clear {
      border: none;
      background: #ffccbc;
      color: #fff;
    }
    .action-btn.clear:hover { background: #ffab91; }
    .page-footer {
      max-width: 720px;
      margin: 24px auto 0;
      text-align: center;
    }
    .footer-pill {
      display: inline-block;
      background: linear-gradient(135deg, #c8e6c9, #a5d6a7);
      padding: 14px 36px;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      color: #e65100;
      margin-bottom: 14px;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--title-blue);
      text-decoration: none;
      font-size: 14px;
    }
    .footer-links a:hover { text-decoration: underline; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(55, 71, 79, 0.92);
      color: #fff;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.35s;
      z-index: 200;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 300;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>AI融合课</h1>
    <p>认识面积交互课件</p>
  </header>

  <main class="card">
    <div class="tabs">
      <button type="button" class="tab active" data-panel="learn">认识面积</button>
      <button type="button" class="tab" data-panel="compare">面积比较</button>
    </div>

    <!-- 认识面积 -->
    <section class="panel active" id="panel-learn">
      <p class="hint">选择一种颜色，然后点击图形进行填充</p>
      <div class="colors" id="learnColors"></div>
      <div class="learn-canvas">
        <div class="shapes-grid" id="shapesGrid"></div>
      </div>
    </section>

    <!-- 面积比较 -->
    <section class="panel" id="panel-compare">
      <p class="hint">拖动图形填入空位；已有图形不会消失。点「密铺」只补空白格（可混放方块、圆、三角）</p>
      <div class="compare-stage">
        <div class="compare-col">
          <div class="compare-counter" id="counterA">
            <span class="mini-shape square" id="miniA"></span>
            <span>× <strong id="countA">0</strong></span>
          </div>
          <div class="compare-board" id="boardA" data-zone="a" tabindex="0" aria-label="图形1填充区">
            <div class="tile-grid grid-a" id="gridA"></div>
          </div>
          <span class="compare-badge n1">1</span>
        </div>
        <div class="compare-col">
          <div class="compare-counter" id="counterB">
            <span class="mini-shape circle" id="miniB"></span>
            <span>× <strong id="countB">0</strong></span>
          </div>
          <div class="compare-board" id="boardB" data-zone="b" tabindex="0" aria-label="图形2填充区">
            <div class="tile-grid grid-b" id="gridB"></div>
          </div>
          <span class="compare-badge n2">2</span>
        </div>
      </div>
      <p class="compare-result" id="compareResult"></p>
      <div class="shape-palette" id="shapePalette">
        <div class="palette-pick active" data-shape="square" draggable="true">
          <div class="pick-shape square"></div>
        </div>
        <div class="palette-pick" data-shape="circle" draggable="true">
          <div class="pick-shape circle"></div>
        </div>
        <div class="palette-pick" data-shape="triangle" draggable="true">
          <div class="pick-shape triangle"></div>
        </div>
      </div>
      <div class="action-btns">
        <button type="button" class="action-btn" id="btnFill1">①号密铺</button>
        <button type="button" class="action-btn" id="btnFill2">②号密铺</button>
        <button type="button" class="action-btn clear" id="btnClear">清空</button>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <div class="footer-pill">《认识面积与大小》</div>
    <div class="footer-links">
      <a href="area.html" download="认识面积.html">HTML离线文件</a>
      <a href="#" onclick="alert('请在希沃白板或本地打开配套 PPT');return false">PPT | 希沃</a>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
(function () {
  const LEARN_COLORS = ["#ef5350", "#66bb6a", "#42a5f5", "#ffee58", "#ec407a"];
  const ZONE_CFG = {
    a: { total: 10, defaultShape: "square", gridClass: "grid-a" },
    b: { total: 12, defaultShape: "circle", gridClass: "grid-b" },
  };

  let learnColor = LEARN_COLORS[3];
  let selectedShape = "square";
  const slots = {
    a: Array(ZONE_CFG.a.total).fill(null),
    b: Array(ZONE_CFG.b.total).fill(null),
  };

  const shapeFills = {
    triangle: "#ff7043",
    square: "#66bb6a",
    parallelogram: "#42a5f5",
    trapezoid: "#f48fb1",
    circle: "#ff7043",
    notch: "transparent",
  };

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.remove("show"), 2000);
  }

  /* ---------- 认识面积 ---------- */
  function initLearnColors() {
    const el = document.getElementById("learnColors");
    el.innerHTML = LEARN_COLORS.map(
      (c, i) =>
        `<button type="button" class="color-dot${c === learnColor ? " active" : ""}" data-color="${c}" style="background:${c}" aria-label="颜色"></button>`
    ).join("");
    el.onclick = (e) => {
      const btn = e.target.closest(".color-dot");
      if (!btn) return;
      learnColor = btn.dataset.color;
      el.querySelectorAll(".color-dot").forEach((d) => d.classList.remove("active"));
      btn.classList.add("active");
    };
  }

  function initLearnShapes() {
    const grid = document.getElementById("shapesGrid");
    const stroke = 'stroke="#81d4fa" stroke-width="3"';
    const defs = [
      {
        id: "triangle",
        svg: `<svg viewBox="0 0 120 100"><polygon class="shape-fill" points="60,12 108,92 12,92" fill="${shapeFills.triangle}" ${stroke}/></svg>`,
      },
      {
        id: "square",
        svg: `<svg viewBox="0 0 120 100"><rect class="shape-fill" x="20" y="15" width="80" height="80" fill="${shapeFills.square}" ${stroke}/></svg>`,
      },
      {
        id: "parallelogram",
        svg: `<svg viewBox="0 0 120 100"><polygon class="shape-fill" points="35,15 105,15 85,85 15,85" fill="${shapeFills.parallelogram}" ${stroke}/></svg>`,
      },
      {
        id: "trapezoid",
        svg: `<svg viewBox="0 0 120 100"><polygon class="shape-fill" points="30,20 90,20 108,85 12,85" fill="${shapeFills.trapezoid}" ${stroke}/></svg>`,
      },
      {
        id: "circle",
        svg: `<svg viewBox="0 0 120 100"><circle class="shape-fill" cx="60" cy="50" r="42" fill="${shapeFills.circle}" ${stroke}/></svg>`,
      },
      {
        id: "notch",
        svg: `<svg viewBox="0 0 120 100">
          <path class="shape-fill" d="M20 15 H100 V55 H70 V85 H20 Z" fill="transparent"/>
          <path class="shape-notch" d="M20 15 H100 V55 H70 V55 H70 V85 H20 Z" fill="none"/>
        </svg>`,
      },
    ];
    grid.innerHTML = defs
      .map((d) => `<div class="shape-item" data-id="${d.id}">${d.svg}</div>`)
      .join("");

    grid.querySelectorAll(".shape-item").forEach((item) => {
      item.addEventListener("click", () => {
        item.querySelectorAll(".shape-fill, .shape-notch").forEach((el) => {
          el.setAttribute("fill", learnColor);
        });
      });
    });
  }

  /* ---------- 面积比较（密铺画布） ---------- */
  function buildSlotGrids() {
    ["a", "b"].forEach((zone) => {
      const grid = document.getElementById(zone === "a" ? "gridA" : "gridB");
      const n = ZONE_CFG[zone].total;
      grid.innerHTML = Array(n)
        .fill(0)
        .map((_, i) => `<div class="tile-slot" data-zone="${zone}" data-i="${i}"></div>`)
        .join("");
    });
  }

  function setMiniIcon(el, type) {
    el.className = "mini-shape " + type;
  }

  function dominantShape(zone) {
    const data = slots[zone].filter(Boolean);
    if (!data.length) return ZONE_CFG[zone].defaultShape;
    const counts = {};
    data.forEach((s) => {
      counts[s] = (counts[s] || 0) + 1;
    });
    return Object.keys(counts).sort((x, y) => counts[y] - counts[x])[0];
  }

  function renderCompare() {
    ["a", "b"].forEach((zone) => {
      const grid = document.getElementById(zone === "a" ? "gridA" : "gridB");
      const slotEls = grid.querySelectorAll(".tile-slot");
      slots[zone].forEach((shape, i) => {
        slotEls[i].innerHTML = shape
          ? `<div class="tile-piece ${shape}"></div>`
          : "";
      });
      const count = slots[zone].filter(Boolean).length;
      const dom = dominantShape(zone);
      document.getElementById(zone === "a" ? "countA" : "countB").textContent = count;
      setMiniIcon(document.getElementById(zone === "a" ? "miniA" : "miniB"), dom);
    });
    updateCompareResult();
  }

  function updateCompareResult() {
    const ca = slots.a.filter(Boolean).length;
    const cb = slots.b.filter(Boolean).length;
    const el = document.getElementById("compareResult");
    if (!ca && !cb) {
      el.textContent = "";
      return;
    }
    if (ca > cb) el.textContent = "① 号图形面积更大";
    else if (cb > ca) el.textContent = "② 号图形面积更大";
    else el.textContent = "两个图形面积一样大";
  }

  function firstEmptyIndex(zone) {
    return slots[zone].findIndex((s) => !s);
  }

  function placeNext(zone, shape) {
    const i = firstEmptyIndex(zone);
    if (i === -1) {
      showToast("已经铺满了");
      return false;
    }
    slots[zone][i] = shape;
    renderCompare();
    return true;
  }

  function shapeLabel(shape) {
    return { square: "正方形", circle: "圆形", triangle: "三角形" }[shape] || shape;
  }

  function placeAtSlot(zone, index, shape) {
    if (index < 0 || index >= ZONE_CFG[zone].total) return;
    if (slots[zone][index]) {
      showToast("该格已有图形，请选空位添加");
      return;
    }
    slots[zone][index] = shape;
    renderCompare();
  }

  /** 密铺：只填充空位，不覆盖已有图形 */
  function fillEmpty(zone, shape) {
    let added = 0;
    slots[zone].forEach((s, i) => {
      if (!s) {
        slots[zone][i] = shape;
        added++;
      }
    });
    if (added === 0) {
      showToast(`${zone === "a" ? "①" : "②"}号框已满，无法再添加`);
    } else {
      showToast(`${zone === "a" ? "①" : "②"}号框已添加 ${added} 个${shapeLabel(shape)}`);
    }
    renderCompare();
  }

  function clearCompare() {
    slots.a = Array(ZONE_CFG.a.total).fill(null);
    slots.b = Array(ZONE_CFG.b.total).fill(null);
    renderCompare();
    showToast("已清空");
  }

  function selectPalette(shape) {
    selectedShape = shape;
    document.querySelectorAll(".palette-pick").forEach((p) => {
      p.classList.toggle("active", p.dataset.shape === shape);
    });
  }

  let draggingShape = null;

  function initCompareInteractions() {
    document.querySelectorAll(".palette-pick").forEach((pick) => {
      pick.addEventListener("click", () => selectPalette(pick.dataset.shape));
      pick.addEventListener("dragstart", (e) => {
        draggingShape = pick.dataset.shape;
        pick.classList.add("dragging");
        selectPalette(draggingShape);
        e.dataTransfer.setData("application/x-shape", draggingShape);
        e.dataTransfer.effectAllowed = "copy";
      });
      pick.addEventListener("dragend", () => {
        pick.classList.remove("dragging");
        draggingShape = null;
      });
    });

    document.querySelectorAll(".compare-board").forEach((board) => {
      const zone = board.dataset.zone;

      board.addEventListener("dragover", (e) => {
        e.preventDefault();
        board.classList.add("drag-over");
        e.dataTransfer.dropEffect = "copy";
      });
      board.addEventListener("dragleave", () => board.classList.remove("drag-over"));
      board.addEventListener("drop", (e) => {
        e.preventDefault();
        board.classList.remove("drag-over");
        const shape =
          e.dataTransfer.getData("application/x-shape") || draggingShape || selectedShape;
        const slot = e.target.closest(".tile-slot");
        if (slot) placeAtSlot(zone, +slot.dataset.i, shape);
        else placeNext(zone, shape);
      });
      board.addEventListener("click", (e) => {
        const slot = e.target.closest(".tile-slot");
        if (slot) placeAtSlot(zone, +slot.dataset.i, selectedShape);
        else placeNext(zone, selectedShape);
      });
    });

    let touchShape = null;
    let touchEl = null;

    document.querySelectorAll(".palette-pick").forEach((pick) => {
      pick.addEventListener(
        "touchstart",
        (e) => {
          touchShape = pick.dataset.shape;
          selectPalette(touchShape);
          touchEl = document.createElement("div");
          touchEl.className = "drag-ghost";
          touchEl.innerHTML = `<div class="pick-shape ${touchShape}" style="width:48px;height:48px"></div>`;
          const t = e.touches[0];
          touchEl.style.left = t.clientX - 24 + "px";
          touchEl.style.top = t.clientY - 24 + "px";
          document.body.appendChild(touchEl);
        },
        { passive: true }
      );
    });

    document.addEventListener(
      "touchmove",
      (e) => {
        if (!touchEl) return;
        const t = e.touches[0];
        touchEl.style.left = t.clientX - 24 + "px";
        touchEl.style.top = t.clientY - 24 + "px";
      },
      { passive: true }
    );

    document.addEventListener("touchend", (e) => {
      if (!touchEl) return;
      const t = e.changedTouches[0];
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const board = target?.closest(".compare-board");
      if (board) {
        const zone = board.dataset.zone;
        const slot = target.closest(".tile-slot");
        if (slot) placeAtSlot(zone, +slot.dataset.i, touchShape);
        else placeNext(zone, touchShape);
      }
      touchEl.remove();
      touchEl = null;
      touchShape = null;
    });
  }

  /* ---------- Tabs ---------- */
  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("panel-" + tab.dataset.panel).classList.add("active");
    });
  });

  document.getElementById("btnFill1").onclick = () => fillEmpty("a", selectedShape);
  document.getElementById("btnFill2").onclick = () => fillEmpty("b", selectedShape);
  document.getElementById("btnClear").onclick = clearCompare;

  initLearnColors();
  initLearnShapes();
  buildSlotGrids();
  initCompareInteractions();
  renderCompare();
})();
  </script>
</body>
</html>
