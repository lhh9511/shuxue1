<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI融合课 · 认识面积交互课件</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --mint: #dff5f0;
      --mint-deep: #c5ebe3;
      --teal: #4db6ac;
      --teal-dark: #3a9d94;
      --title-blue: #3d8fd9;
      --canvas-yellow: #fff9e6;
      --orange: #ff7043;
      --blue-shape: #42a5f5;
      --purple: #ab47bc;
      --pink: #f48fb1;
      --text: #37474f;
      --muted: #78909c;
      --card-radius: 24px;
      --font-display: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
      --font-body: "Noto Sans SC", system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      min-height: 100vh;
      color: var(--text);
      background: linear-gradient(160deg, #e8f8f5 0%, #dff5f0 40%, #d4efe8 100%);
      padding: 20px 16px 32px;
    }
    .page-header {
      max-width: 720px;
      margin: 0 auto 16px;
      padding: 0 8px;
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      color: var(--title-blue);
      font-weight: 400;
      line-height: 1.2;
    }
    .page-header p {
      font-family: var(--font-display);
      font-size: clamp(1.1rem, 3.5vw, 1.45rem);
      color: var(--title-blue);
      opacity: 0.95;
      margin-top: 4px;
    }
    .card {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border-radius: var(--card-radius);
      box-shadow: 0 12px 40px rgba(77, 182, 172, 0.18);
      padding: 24px 20px 28px;
    }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 18px;
      background: #f5f5f5;
      border-radius: 999px;
      padding: 4px;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }
    .tab {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: 1.05rem;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.25s;
    }
    .tab.active {
      background: var(--teal);
      color: #fff;
      box-shadow: 0 4px 12px rgba(77, 182, 172, 0.45);
    }
    .hint {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: none; }
    }
    /* 认识面积 */
    .colors {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .color-dot {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .color-dot:hover { transform: scale(1.08); }
    .color-dot.active {
      border-color: #2196f3;
      box-shadow: 0 0 0 3px #fff, 0 0 0 5px #2196f3;
    }
    .learn-canvas {
      background: var(--canvas-yellow);
      border-radius: 16px;
      padding: 28px 20px;
      min-height: 280px;
    }
    .shapes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px 16px;
      max-width: 520px;
      margin: 0 auto;
    }
    .shape-item {
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      padding: 8px;
      border-radius: 12px;
      transition: transform 0.15s;
    }
    .shape-item:hover { transform: scale(1.04); }
    .shape-item svg {
      width: 100%;
      max-width: 110px;
      height: auto;
      display: block;
    }
    .shape-item .shape-fill {
      stroke: #81d4fa;
      stroke-width: 3;
      transition: fill 0.2s;
    }
    .shape-item .shape-notch {
      fill: none;
      stroke: #81d4fa;
      stroke-width: 3;
    }
    /* 面积比较 */
    .compare-zones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    @media (max-width: 480px) {
      .compare-zones { gap: 10px; }
    }
    .zone-wrap { text-align: center; }
    .zone-counter {
      font-family: var(--font-display);
      font-size: 1.1rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 28px;
    }
    .zone-counter .icon {
      width: 22px;
      height: 22px;
      display: inline-block;
    }
    .drop-zone {
      border: 3px solid #cfd8dc;
      border-radius: 12px;
      background: #fafafa;
      min-height: 140px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .drop-grid {
      display: grid;
      gap: 4px;
      width: 100%;
      max-width: 200px;
    }
    .drop-grid.zone-a { grid-template-columns: repeat(5, 1fr); }
    .drop-grid.zone-b { grid-template-columns: repeat(4, 1fr); }
    .drop-cell {
      aspect-ratio: 1;
      border: 1px dashed #e0e0e0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: #fff;
      transition: background 0.15s;
    }
    .drop-cell.filled { border-style: solid; border-color: transparent; }
    .drop-cell svg { width: 85%; height: 85%; }
    .zone-label {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
    }
    .zone-label.a { background: #ef5350; }
    .zone-label.b { background: var(--blue-shape); }
    .shape-palette {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .palette-item {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      border: 3px solid transparent;
      border-radius: 12px;
      padding: 6px;
      touch-action: none;
      transition: border-color 0.2s, transform 0.15s;
    }
    .palette-item.active {
      border-color: #2196f3;
      background: #e3f2fd;
    }
    .palette-item svg { width: 44px; height: 44px; }
    .palette-item.dragging { opacity: 0.5; cursor: grabbing; }
    .action-btns {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .action-btn {
      padding: 12px 22px;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: 1rem;
      cursor: pointer;
      border: 2px solid #b0bec5;
      background: #fff;
      color: var(--teal-dark);
      transition: all 0.2s;
    }
    .action-btn:hover {
      border-color: var(--teal);
      background: #e0f2f1;
    }
    .action-btn.clear {
      border: none;
      background: #ffccbc;
      color: #fff;
    }
    .action-btn.clear:hover { background: #ffab91; }
    .page-footer {
      max-width: 720px;
      margin: 24px auto 0;
      text-align: center;
    }
    .footer-pill {
      display: inline-block;
      background: linear-gradient(135deg, #c8e6c9, #a5d6a7);
      padding: 14px 36px;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      color: #e65100;
      margin-bottom: 14px;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--title-blue);
      text-decoration: none;
      font-size: 14px;
    }
    .footer-links a:hover { text-decoration: underline; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(55, 71, 79, 0.92);
      color: #fff;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.35s;
      z-index: 200;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 300;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>AI融合课</h1>
    <p>认识面积交互课件</p>
  </header>

  <main class="card">
    <div class="tabs">
      <button type="button" class="tab active" data-panel="learn">认识面积</button>
      <button type="button" class="tab" data-panel="compare">面积比较</button>
    </div>

    <!-- 认识面积 -->
    <section class="panel active" id="panel-learn">
      <p class="hint">选择一种颜色，然后点击图形进行填充</p>
      <div class="colors" id="learnColors"></div>
      <div class="learn-canvas">
        <div class="shapes-grid" id="shapesGrid"></div>
      </div>
    </section>

    <!-- 面积比较 -->
    <section class="panel" id="panel-compare">
      <p class="hint">拖动下方图形到框内进行填充，或点击「密铺」按钮自动铺满</p>
      <div class="compare-zones">
        <div class="zone-wrap">
          <div class="zone-counter" id="counterA">
            <span class="icon" id="iconA"></span>
            <span id="textA">× 0</span>
          </div>
          <div class="drop-zone" data-zone="a">
            <div class="drop-grid zone-a" id="gridA"></div>
          </div>
          <span class="zone-label a">1</span>
        </div>
        <div class="zone-wrap">
          <div class="zone-counter" id="counterB">
            <span class="icon" id="iconB"></span>
            <span id="textB">× 0</span>
          </div>
          <div class="drop-zone" data-zone="b">
            <div class="drop-grid zone-b" id="gridB"></div>
          </div>
          <span class="zone-label b">2</span>
        </div>
      </div>
      <div class="shape-palette" id="shapePalette"></div>
      <div class="action-btns">
        <button type="button" class="action-btn" id="btnFill1">①号密铺</button>
        <button type="button" class="action-btn" id="btnFill2">②号密铺</button>
        <button type="button" class="action-btn clear" id="btnClear">清空</button>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <div class="footer-pill">《认识面积与大小》</div>
    <div class="footer-links">
      <a href="area.html" download="认识面积.html">HTML离线文件</a>
      <a href="#" onclick="alert('请在希沃白板或本地打开配套 PPT');return false">PPT | 希沃</a>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
(function () {
  const LEARN_COLORS = ["#ef5350", "#66bb6a", "#42a5f5", "#ffee58", "#ec407a"];
  const SHAPES = {
    square: { color: "#ff7043", label: "正方形" },
    circle: { color: "#42a5f5", label: "圆形" },
    triangle: { color: "#ab47bc", label: "三角形" },
  };

  let learnColor = LEARN_COLORS[3];
  let selectedShape = "square";
  const zoneData = { a: [], b: [] };
  const ZONE_SIZE = { a: { cols: 5, rows: 2, total: 10 }, b: { cols: 4, rows: 3, total: 12 } };

  const shapeFills = {
    triangle: "#ff7043",
    square: "#66bb6a",
    parallelogram: "#42a5f5",
    trapezoid: "#f48fb1",
    circle: "#ff7043",
    notch: "transparent",
  };

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.remove("show"), 2000);
  }

  function shapeSvg(type, fill, size) {
    const s = size || 44;
    const stroke = "#81d4fa";
    const maps = {
      square: `<rect x="4" y="4" width="${s - 8}" height="${s - 8}" rx="2" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`,
      circle: `<circle cx="${s / 2}" cy="${s / 2}" r="${s / 2 - 6}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`,
      triangle: `<polygon points="${s / 2},6 ${s - 6},${s - 6} 6,${s - 6}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`,
    };
    return `<svg viewBox="0 0 ${s} ${s}" width="${s}" height="${s}">${maps[type]}</svg>`;
  }

  function counterIcon(type) {
    const c = SHAPES[type].color;
    if (type === "square") return `<svg viewBox="0 0 22 22"><rect x="2" y="2" width="18" height="18" fill="${c}"/></svg>`;
    if (type === "circle") return `<svg viewBox="0 0 22 22"><circle cx="11" cy="11" r="9" fill="${c}"/></svg>`;
    return `<svg viewBox="0 0 22 22"><polygon points="11,3 19,19 3,19" fill="${c}"/></svg>`;
  }

  /* ---------- 认识面积 ---------- */
  function initLearnColors() {
    const el = document.getElementById("learnColors");
    el.innerHTML = LEARN_COLORS.map(
      (c, i) =>
        `<button type="button" class="color-dot${c === learnColor ? " active" : ""}" data-color="${c}" style="background:${c}" aria-label="颜色"></button>`
    ).join("");
    el.onclick = (e) => {
      const btn = e.target.closest(".color-dot");
      if (!btn) return;
      learnColor = btn.dataset.color;
      el.querySelectorAll(".color-dot").forEach((d) => d.classList.remove("active"));
      btn.classList.add("active");
    };
  }

  function initLearnShapes() {
    const grid = document.getElementById("shapesGrid");
    const stroke = 'stroke="#81d4fa" stroke-width="3"';
    const defs = [
      {
        id: "triangle",
        svg: `<svg viewBox="0 0 120 100"><polygon class="shape-fill" points="60,12 108,92 12,92" fill="${shapeFills.triangle}" ${stroke}/></svg>`,
      },
      {
        id: "square",
        svg: `<svg viewBox="0 0 120 100"><rect class="shape-fill" x="20" y="15" width="80" height="80" fill="${shapeFills.square}" ${stroke}/></svg>`,
      },
      {
        id: "parallelogram",
        svg: `<svg viewBox="0 0 120 100"><polygon class="shape-fill" points="35,15 105,15 85,85 15,85" fill="${shapeFills.parallelogram}" ${stroke}/></svg>`,
      },
      {
        id: "trapezoid",
        svg: `<svg viewBox="0 0 120 100"><polygon class="shape-fill" points="30,20 90,20 108,85 12,85" fill="${shapeFills.trapezoid}" ${stroke}/></svg>`,
      },
      {
        id: "circle",
        svg: `<svg viewBox="0 0 120 100"><circle class="shape-fill" cx="60" cy="50" r="42" fill="${shapeFills.circle}" ${stroke}/></svg>`,
      },
      {
        id: "notch",
        svg: `<svg viewBox="0 0 120 100">
          <path class="shape-fill" d="M20 15 H100 V55 H70 V85 H20 Z" fill="transparent"/>
          <path class="shape-notch" d="M20 15 H100 V55 H70 V55 H70 V85 H20 Z" fill="none"/>
        </svg>`,
      },
    ];
    grid.innerHTML = defs
      .map((d) => `<div class="shape-item" data-id="${d.id}">${d.svg}</div>`)
      .join("");

    grid.querySelectorAll(".shape-item").forEach((item) => {
      item.addEventListener("click", () => {
        item.querySelectorAll(".shape-fill, .shape-notch").forEach((el) => {
          el.setAttribute("fill", learnColor);
        });
      });
    });
  }

  /* ---------- 面积比较 ---------- */
  function initZoneGrids() {
    const gridA = document.getElementById("gridA");
    const gridB = document.getElementById("gridB");
    gridA.innerHTML = Array(ZONE_SIZE.a.total)
      .fill(0)
      .map((_, i) => `<div class="drop-cell" data-zone="a" data-i="${i}"></div>`)
      .join("");
    gridB.innerHTML = Array(ZONE_SIZE.b.total)
      .fill(0)
      .map((_, i) => `<div class="drop-cell" data-zone="b" data-i="${i}"></div>`)
      .join("");
    bindDropZones();
  }

  function initPalette() {
    const el = document.getElementById("shapePalette");
    el.innerHTML = ["square", "circle", "triangle"]
      .map(
        (t) =>
          `<div class="palette-item${t === selectedShape ? " active" : ""}" data-shape="${t}" draggable="true">${shapeSvg(t, SHAPES[t].color, 48)}</div>`
      )
      .join("");

    el.querySelectorAll(".palette-item").forEach((item) => {
      item.addEventListener("click", () => selectPalette(item.dataset.shape));
      item.addEventListener("dragstart", onDragStart);
      item.addEventListener("dragend", onDragEnd);
    });
    setupTouchDrag();
  }

  function selectPalette(shape) {
    selectedShape = shape;
    document.querySelectorAll(".palette-item").forEach((p) => {
      p.classList.toggle("active", p.dataset.shape === shape);
    });
  }

  let dragShape = null;
  let ghost = null;

  function onDragStart(e) {
    const item = e.target.closest(".palette-item");
    if (!item) return;
    dragShape = item.dataset.shape;
    item.classList.add("dragging");
    e.dataTransfer.setData("text/plain", dragShape);
    e.dataTransfer.effectAllowed = "copy";
  }

  function onDragEnd(e) {
    e.target.closest(".palette-item")?.classList.remove("dragging");
    dragShape = null;
  }

  function setupTouchDrag() {
    let touchShape = null;
    let touchGhost = null;

    document.querySelectorAll(".palette-item").forEach((item) => {
      item.addEventListener(
        "touchstart",
        (e) => {
          touchShape = item.dataset.shape;
          selectPalette(touchShape);
          const touch = e.touches[0];
          touchGhost = document.createElement("div");
          touchGhost.className = "drag-ghost";
          touchGhost.innerHTML = shapeSvg(touchShape, SHAPES[touchShape].color, 48);
          touchGhost.style.left = touch.clientX - 24 + "px";
          touchGhost.style.top = touch.clientY - 24 + "px";
          document.body.appendChild(touchGhost);
        },
        { passive: true }
      );
    });

    document.addEventListener(
      "touchmove",
      (e) => {
        if (!touchGhost) return;
        const touch = e.touches[0];
        touchGhost.style.left = touch.clientX - 24 + "px";
        touchGhost.style.top = touch.clientY - 24 + "px";
      },
      { passive: true }
    );

    document.addEventListener("touchend", (e) => {
      if (!touchGhost || !touchShape) return;
      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const cell = el?.closest(".drop-cell");
      if (cell) placeInCell(cell.dataset.zone, +cell.dataset.i, touchShape);
      touchGhost.remove();
      touchGhost = null;
      touchShape = null;
    });
  }

  function placeInCell(zone, index, shape) {
    const max = ZONE_SIZE[zone].total;
    if (index < 0 || index >= max) return;
    zoneData[zone][index] = shape;
    renderZones();
  }

  function bindDropZones() {
    document.querySelectorAll(".drop-zone").forEach((zone) => {
      zone.addEventListener("dragover", (e) => {
        if (e.target.classList.contains("drop-cell")) {
          e.preventDefault();
          e.dataTransfer.dropEffect = "copy";
        }
      });
      zone.addEventListener("drop", (e) => {
        const cell = e.target.closest(".drop-cell");
        if (!cell) return;
        e.preventDefault();
        const shape = e.dataTransfer.getData("text/plain") || dragShape || selectedShape;
        placeInCell(cell.dataset.zone, +cell.dataset.i, shape);
      });
      zone.addEventListener("click", (e) => {
        const cell = e.target.closest(".drop-cell");
        if (!cell) return;
        placeInCell(cell.dataset.zone, +cell.dataset.i, selectedShape);
      });
    });
  }

  function renderZones() {
    ["a", "b"].forEach((zone) => {
      const grid = document.getElementById(zone === "a" ? "gridA" : "gridB");
      const cells = grid.querySelectorAll(".drop-cell");
      const data = zoneData[zone];
      cells.forEach((cell, i) => {
        const shape = data[i];
        if (shape) {
          cell.classList.add("filled");
          cell.innerHTML = shapeSvg(shape, SHAPES[shape].color, 36);
        } else {
          cell.classList.remove("filled");
          cell.innerHTML = "";
        }
      });
      const count = data.filter(Boolean).length;
      const dominant = getDominantShape(data) || selectedShape;
      document.getElementById(zone === "a" ? "iconA" : "iconB").innerHTML = counterIcon(dominant);
      document.getElementById(zone === "a" ? "textA" : "textB").textContent = "× " + count;
    });
  }

  function getDominantShape(arr) {
    const counts = {};
    arr.filter(Boolean).forEach((s) => {
      counts[s] = (counts[s] || 0) + 1;
    });
    let best = null;
    let max = 0;
    for (const k in counts) {
      if (counts[k] > max) {
        max = counts[k];
        best = k;
      }
    }
    return best;
  }

  function tessellate(zone) {
    const { total } = ZONE_SIZE[zone];
    zoneData[zone] = Array(total).fill(selectedShape);
    renderZones();
    showToast(`${zone === "a" ? "①" : "②"}号框已密铺完成`);
  }

  function clearAll() {
    zoneData.a = [];
    zoneData.b = [];
    renderZones();
    showToast("已清空");
  }

  /* ---------- Tabs ---------- */
  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("panel-" + tab.dataset.panel).classList.add("active");
    });
  });

  document.getElementById("btnFill1").onclick = () => tessellate("a");
  document.getElementById("btnFill2").onclick = () => tessellate("b");
  document.getElementById("btnClear").onclick = clearAll;

  initLearnColors();
  initLearnShapes();
  initZoneGrids();
  initPalette();
  renderZones();
})();
  </script>
</body>
</html>
