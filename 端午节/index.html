<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>端午节小游戏 · 包粽子 + 划龙舟</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="topbar">
    <button type="button" class="home-btn" data-go="splash" aria-label="回首页">🏠</button>
    <h1 class="title">🐉 端午节小游戏 🥟</h1>
    <div class="stars-bar" title="累计星星">
      <span>⭐</span><span id="totalStars">0</span>
    </div>
  </header>

  <main id="main">
    <!-- Splash -->
    <section class="screen active" id="screen-splash">
      <div class="banner">
        <div class="lantern lantern--left">🏮</div>
        <h2 class="banner-title">端午安康！</h2>
        <p class="banner-sub">选一个你想玩的小游戏</p>
        <div class="lantern lantern--right">🏮</div>
      </div>
      <div class="card-row">
        <button type="button" class="game-card game-card--zongzi" data-go="zongzi">
          <div class="game-icon game-icon--svg">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="粽子">
              <defs>
                <linearGradient id="ssg-leaf" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="#84c95e"/>
                  <stop offset="1" stop-color="#2c5e1f"/>
                </linearGradient>
              </defs>
              <ellipse cx="50" cy="92" rx="36" ry="4" fill="#000" opacity="0.18"/>
              <polygon points="50,10 90,84 10,84" fill="url(#ssg-leaf)" stroke="#1c3a14" stroke-width="2.5" stroke-linejoin="round"/>
              <polygon points="50,28 80,78 20,78" fill="rgba(255,255,255,0.12)"/>
              <line x1="50" y1="14" x2="50" y2="84" stroke="#1c3a14" stroke-width="1" opacity="0.4"/>
              <path d="M 20 50 Q 50 44 80 50" stroke="#8d5524" stroke-width="3" fill="none" stroke-linecap="round"/>
              <path d="M 16 66 Q 50 60 84 66" stroke="#8d5524" stroke-width="3" fill="none" stroke-linecap="round"/>
              <path d="M 50 16 L 50 82" stroke="#8d5524" stroke-width="3" stroke-linecap="round"/>
              <path d="M 48 16 Q 50 14 52 16" stroke="#5b3a14" stroke-width="1.5" fill="none"/>
            </svg>
          </div>
          <h3>包粽子工坊</h3>
          <p>选粽叶形状，自由添加食材，<br>包出独一无二的粽子！</p>
        </button>
        <button type="button" class="game-card game-card--race" data-go="race">
          <div class="game-icon game-icon--svg">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="龙舟">
              <defs>
                <linearGradient id="ssg-water" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="#74b9ff"/>
                  <stop offset="1" stop-color="#3b94d0"/>
                </linearGradient>
                <linearGradient id="ssg-boat" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="#b07b48"/>
                  <stop offset="1" stop-color="#5b3a14"/>
                </linearGradient>
              </defs>
              <!-- water -->
              <rect x="0" y="76" width="100" height="24" fill="url(#ssg-water)"/>
              <path d="M 0 84 Q 12 80 24 84 T 48 84 T 72 84 T 100 84" stroke="#fff" stroke-width="1.2" fill="none" opacity="0.7"/>
              <path d="M 0 92 Q 14 88 28 92 T 56 92 T 84 92 T 100 92" stroke="#fff" stroke-width="1" fill="none" opacity="0.5"/>
              <!-- dragon head -->
              <path d="M 6 64 Q 10 46 22 50 L 26 60 L 30 55 L 28 66 L 24 72 L 18 74 L 10 70 Q 4 67 6 64 Z"
                    fill="#c0392b" stroke="#5b0a0a" stroke-width="1.5" stroke-linejoin="round"/>
              <circle cx="20" cy="55" r="2.2" fill="#fff" stroke="#000" stroke-width="0.6"/>
              <circle cx="20" cy="55" r="0.9" fill="#000"/>
              <path d="M 12 58 Q 16 56 20 58" stroke="#fff" stroke-width="0.6" fill="none"/>
              <!-- dragon tail -->
              <path d="M 80 64 L 92 52 L 90 64 L 96 60 L 92 72 L 88 66 L 80 76 Z"
                    fill="#c0392b" stroke="#5b0a0a" stroke-width="1.5" stroke-linejoin="round"/>
              <!-- boat body -->
              <path d="M 18 66 L 84 66 Q 90 66 86 76 Q 52 86 18 76 Q 12 70 18 66 Z"
                    fill="url(#ssg-boat)" stroke="#3a2511" stroke-width="2"/>
              <path d="M 18 66 L 84 66" stroke="#3a2511" stroke-width="2.5"/>
              <!-- paddlers -->
              <circle cx="38" cy="56" r="3.5" fill="#f4c79a" stroke="#3a2511" stroke-width="0.6"/>
              <rect x="34" y="59" width="8" height="9" rx="2" fill="#e74c3c" stroke="#3a2511" stroke-width="0.6"/>
              <line x1="38" y1="50" x2="38" y2="60" stroke="#5b3a14" stroke-width="1.4"/>
              <circle cx="38" cy="48" r="1.6" fill="#a56b35" stroke="#3a2511" stroke-width="0.5"/>

              <circle cx="52" cy="56" r="3.5" fill="#f4c79a" stroke="#3a2511" stroke-width="0.6"/>
              <rect x="48" y="59" width="8" height="9" rx="2" fill="#27ae60" stroke="#3a2511" stroke-width="0.6"/>
              <line x1="52" y1="50" x2="52" y2="60" stroke="#5b3a14" stroke-width="1.4"/>
              <circle cx="52" cy="48" r="1.6" fill="#a56b35" stroke="#3a2511" stroke-width="0.5"/>

              <circle cx="66" cy="56" r="3.5" fill="#f4c79a" stroke="#3a2511" stroke-width="0.6"/>
              <rect x="62" y="59" width="8" height="9" rx="2" fill="#3498db" stroke="#3a2511" stroke-width="0.6"/>
              <line x1="66" y1="50" x2="66" y2="60" stroke="#5b3a14" stroke-width="1.4"/>
              <circle cx="66" cy="48" r="1.6" fill="#a56b35" stroke="#3a2511" stroke-width="0.5"/>
            </svg>
          </div>
          <h3>划龙舟竞渡</h3>
          <p>限时答题前进一步，<br>抢先冲线拿 🏆！</p>
        </button>
      </div>
      <p class="footer-tip">「五月五，是端阳。门插艾，香满堂。吃粽子，洒白糖。龙舟下水喜洋洋。」</p>
    </section>

    <!-- Zongzi screen -->
    <section class="screen" id="screen-zongzi">
      <!-- Step 1: pick leaf shape -->
      <div class="zg-step" id="zg-shape">
        <h2 class="step-title">第 1 步：选粽叶形状</h2>
        <p class="step-sub">点一种喜欢的粽形开始制作</p>
        <div class="shape-grid" id="shapeGrid"></div>
      </div>

      <!-- Step 2: free add ingredients -->
      <div class="zg-step zg-step--hidden" id="zg-fill">
        <div class="fill-head">
          <h2 class="step-title">第 2 步：自由添加食材</h2>
          <p class="step-sub">想放什么放什么。多点几下可以放多份哦~</p>
        </div>
        <div class="fill-layout">
          <!-- The leaf -->
          <div class="leaf-stage">
            <div class="leaf-wrap" id="leafWrap">
              <svg class="leaf-shape" id="leafShape" viewBox="0 0 240 240" aria-hidden="true"></svg>
              <div class="leaf-inside" id="leafInside"></div>
            </div>
            <div class="leaf-tally" id="leafTally">还没放任何食材</div>
            <div class="leaf-btn-row">
              <button type="button" class="btn btn-outline btn-sm" id="btnReset">🗑️ 倒掉重来</button>
              <button type="button" class="btn btn-primary btn-sm" id="btnWrap" disabled>🪢 包好 → 下锅</button>
            </div>
          </div>
          <!-- Ingredient buffet -->
          <div class="buffet-wrap">
            <p class="buffet-tag">🧺 食材篮 · 点击添加</p>
            <div class="buffet" id="buffet"></div>
            <p class="buffet-hint">提示：粽子至少要有<strong> 糯米 </strong>，不然不算粽子哦~</p>
          </div>
        </div>
      </div>

      <!-- Step 3: wrap animation -->
      <div class="zg-step zg-step--hidden" id="zg-wrap">
        <h2 class="step-title">🪢 包扎中…</h2>
        <p class="step-sub" id="wrapText">麻绳一圈一圈缠上去…</p>
        <div class="wrap-stage">
          <svg class="wrap-svg" id="wrapSvg" viewBox="0 0 300 300"></svg>
        </div>
      </div>

      <!-- Step 4: cooking -->
      <div class="zg-step zg-step--hidden" id="zg-cook">
        <h2 class="step-title">🔥 锅里咕嘟咕嘟…</h2>
        <div class="pot-wrap">
          <div class="pot">
            <div class="pot-bubble"></div>
            <div class="pot-bubble pot-bubble--2"></div>
            <div class="pot-bubble pot-bubble--3"></div>
            <div class="pot-bubble pot-bubble--4"></div>
            <div class="pot-zongzi" id="cookZongzi"></div>
            <div class="pot-rim"></div>
          </div>
          <div class="pot-flame">🔥🔥🔥</div>
        </div>
        <p class="cooking-text" id="cookText">煮 1 分钟…</p>
      </div>

      <!-- Step 5: done -->
      <div class="zg-step zg-step--hidden" id="zg-done">
        <h2 class="step-title">🎉 出锅啦！</h2>
        <div class="done-card">
          <div class="done-zongzi" id="doneZongzi"></div>
          <div class="done-info">
            <h3 class="done-name" id="doneName"></h3>
            <p class="done-tags" id="doneTags"></p>
            <p class="done-desc" id="doneDesc"></p>
            <div class="done-stats" id="doneStats"></div>
          </div>
        </div>
        <div class="btn-row">
          <button type="button" class="btn btn-primary" id="btnAnother">🥟 再包一个</button>
          <button type="button" class="btn btn-outline" data-go="race">🛶 去划龙舟</button>
        </div>
      </div>
    </section>

    <!-- Race -->
    <section class="screen" id="screen-race">
      <!-- Difficulty pick -->
      <div class="race-step" id="rc-pick">
        <h2 class="step-title">🐉 划龙舟竞渡</h2>
        <p class="step-sub">选一个难度开始比赛</p>
        <div class="diff-grid">
          <button type="button" class="diff-card" data-diff="easy">
            <div class="diff-icon">🌊</div>
            <h3>新手村</h3>
            <p>水道 10 格 · 25 秒/题<br>对手稳速前进</p>
          </button>
          <button type="button" class="diff-card" data-diff="mid">
            <div class="diff-icon">⛵</div>
            <h3>进阶赛</h3>
            <p>水道 12 格 · 15 秒/题<br>对手稳健竞争</p>
          </button>
          <button type="button" class="diff-card" data-diff="hard">
            <div class="diff-icon">⚡</div>
            <h3>大师赛</h3>
            <p>水道 15 格 · 10 秒/题<br>对手越战越勇</p>
          </button>
        </div>
      </div>

      <!-- Race active -->
      <div class="race-step race-step--hidden" id="rc-race">
        <p class="race-status" id="raceStatus"></p>
        <div class="river" id="river">
          <div class="lane lane--player">
            <div class="lane-label">🧑 你</div>
            <div class="lane-track" id="trackPlayer"></div>
          </div>
          <div class="lane lane--cpu">
            <div class="lane-label">🤖 对手</div>
            <div class="lane-track" id="trackCpu"></div>
          </div>
        </div>

        <div class="quiz-card" id="quizCard">
          <div class="quiz-head">
            <span class="quiz-progress" id="quizProgress"></span>
            <span class="quiz-streak" id="quizStreak"></span>
            <span class="quiz-timer" id="quizTimer">⏱️ 15</span>
          </div>
          <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
          <p class="quiz-question" id="quizQuestion"></p>
          <div class="quiz-options" id="quizOptions"></div>
          <p class="quiz-feedback" id="quizFeedback"></p>
        </div>
      </div>

      <!-- Race result -->
      <div class="race-step race-step--hidden" id="rc-result">
        <div class="result-icon" id="resultIcon">🏆</div>
        <h3 id="resultTitle">恭喜冲线！</h3>
        <p id="resultText"></p>
        <div class="result-stats" id="resultStats"></div>
        <div class="btn-row">
          <button type="button" class="btn btn-primary" id="btnRaceAgain">🛶 再来一局</button>
          <button type="button" class="btn btn-outline" data-go="zongzi">🥟 包个粽子庆祝</button>
          <button type="button" class="btn btn-outline" data-go="splash">🏠 回首页</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="confetti" id="confetti" aria-hidden="true"></div>

  <script src="js/app.js"></script>
</body>
</html>
