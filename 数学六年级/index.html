<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>六年级数学互动手册</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app" id="mainApp">
    <header class="header">
      <div class="header-inner">
        <button type="button" class="menu-btn" id="menuBtn" aria-label="打开菜单">☰</button>
        <h1 class="logo">
          <span class="logo-icon">📚</span>
          六年级数学手册
        </h1>
        <div class="stars-bar" id="starsBar" title="累计星星">
          <span class="star-icon">⭐</span>
          <span id="totalStars">0</span>
        </div>
        <a class="lock-btn" href="../../games.html" title="返回主页选择年级" aria-label="返回主页" style="text-decoration:none;color:inherit;display:inline-flex;align-items:center;justify-content:center;">🏠</a>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <p class="sidebar-title">学习目录</p>
        <nav class="nav" id="nav"></nav>
      </aside>

      <main class="main" id="main">
        <section class="page home active" id="page-home">
          <div class="hero">
            <div class="hero-mascot">🦉</div>
            <h2>你好，小数学家！</h2>
            <p>跟着吉祥物一起学数学，每完成一关就能收集星星哦。</p>
            <button type="button" class="btn btn-primary btn-lg" data-go="fracMul">
              开始学习 →
            </button>
          </div>
          <div class="card-grid" id="homeCards"></div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="confetti" id="confetti" aria-hidden="true"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 验证码已移除：自动启动 app
    document.addEventListener("DOMContentLoaded", function () {
      if (typeof window.startApp === "function") window.startApp();
    });
  </script>
</body>
</html>
