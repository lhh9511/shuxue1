# 部署 数学课件（一年级 + 二年级）

name: Deploy 数学课件

on:
  push:
    branches: [main]
    paths:
      - "数学一年级/**"
      - "数学二年级/**"
      - ".github/workflows/deploy-math-grade1.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-math
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site/grade2
          cp -r 数学一年级/* _site/
          cp -r 数学二年级/* _site/grade2/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
