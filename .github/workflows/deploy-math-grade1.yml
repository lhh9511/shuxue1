# 部署 数学课件（一至六年级 + 端午节专题）

name: Deploy 数学课件

on:
  push:
    branches: [main]
    paths:
      - "数学一年级/**"
      - "数学二年级/**"
      - "数学三年级/**"
      - "数学四年级/**"
      - "数学五年级/**"
      - "数学六年级/**"
      - "端午节/**"
      - "贪吃蛇/**"
      - "index.html"
      - "games.html"
      - "css/**"
      - "js/**"
      - "README.md"
      - ".github/workflows/deploy-math-grade1.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-math
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site/grade2 _site/grade3 _site/grade4 _site/grade5 _site/grade6 _site/duanwu _site/数学一年级 _site/数学二年级 _site/数学三年级 _site/数学四年级 _site/数学五年级 _site/数学六年级 _site/端午节 _site/贪吃蛇 _site/snake _site/area
          cp index.html _site/index.html
          cp games.html _site/games.html
          cp -r css _site/css
          cp -r js _site/js
          cp -r 数学一年级/* _site/
          cp -r 数学一年级/* _site/数学一年级/
          cp 数学一年级/area.html _site/area.html
          cp 数学一年级/area.html _site/area/index.html
          cp 数学一年级/area.html "_site/认识面积.html"
          cp 数学一年级/area.html "_site/数学一年级/认识面积.html"
          cp -r 数学二年级/* _site/grade2/
          cp -r 数学二年级/* _site/数学二年级/
          cp -r 数学三年级/* _site/grade3/
          cp -r 数学三年级/* _site/数学三年级/
          cp -r 数学四年级/* _site/grade4/
          cp -r 数学四年级/* _site/数学四年级/
          cp -r 数学五年级/* _site/grade5/
          cp -r 数学五年级/* _site/数学五年级/
          cp -r 数学六年级/* _site/grade6/
          cp -r 数学六年级/* _site/数学六年级/
          cp -r 端午节/* _site/duanwu/
          cp -r 端午节/* _site/端午节/
          cp -r 贪吃蛇/* _site/贪吃蛇/
          cp -r 贪吃蛇/* _site/snake/
          cat > _site/404.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>页面未找到 · 认识面积课件</title>
            <meta http-equiv="refresh" content="2;url=area.html" />
            <style>
              body{font-family:system-ui,sans-serif;text-align:center;padding:48px 20px;background:#e8f8f5;color:#37474f}
              a{color:#3d8fd9;font-size:1.1rem}
              h1{font-size:1.5rem}
            </style>
          </head>
          <body>
            <h1>404 页面不存在</h1>
            <p>正在跳转到认识面积课件…</p>
            <p><a href="area.html">点击打开：认识面积课件</a></p>
            <p><a href="./">一年级数学手册首页</a></p>
          </body>
          </html>
          HTMLEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
