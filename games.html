<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小学数学互动课件 · 1-6 年级</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --c1: #ff6b6b; --c2: #0984e3; --c3: #00b894;
      --c4: #6c5ce7; --c5: #e17055; --c6: #5f3dc4;
      --cf: #c0392b; --ca: #fd79a8;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "Noto Sans SC", system-ui, sans-serif;
      color: #2d3436;
      background: #f0f4ff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 顶部 site title + tab 栏 */
    .topbar {
      flex: 0 0 auto;
      background: linear-gradient(135deg, #6c5ce7 0%, #5f3dc4 50%, #00cec9 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(108, 92, 231, 0.35);
    }
    .topbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 14px 20px 0;
    }
    .topbar h1 {
      font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
      font-size: 1.4rem;
      margin: 0 0 12px;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar h1 .sub {
      font-size: 0.85rem;
      opacity: 0.85;
      font-family: "Noto Sans SC", sans-serif;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 12px 12px 0 0;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      border-bottom: 3px solid transparent;
      transition: background 0.18s, transform 0.12s;
    }
    .tab:hover { background: rgba(255, 255, 255, 0.32); }
    .tab.active {
      background: #f0f4ff;
      color: #2d3436;
      border-bottom-color: var(--c4, #6c5ce7);
      transform: translateY(1px);
    }
    .tab .emoji { font-size: 18px; }
    .tab[data-grade="1"].active { color: var(--c1); border-bottom-color: var(--c1); }
    .tab[data-grade="2"].active { color: var(--c2); border-bottom-color: var(--c2); }
    .tab[data-grade="3"].active { color: var(--c3); border-bottom-color: var(--c3); }
    .tab[data-grade="4"].active { color: var(--c4); border-bottom-color: var(--c4); }
    .tab[data-grade="5"].active { color: var(--c5); border-bottom-color: var(--c5); }
    .tab[data-grade="6"].active { color: var(--c6); border-bottom-color: var(--c6); }
    .tab[data-grade="festival"].active { color: var(--cf); border-bottom-color: var(--cf); }
    .tab[data-grade="area"].active { color: var(--ca); border-bottom-color: var(--ca); }

    /* iframe 容器 */
    .frame-wrap {
      flex: 1 1 auto;
      background: #fff;
      min-height: 0;
      position: relative;
    }
    iframe#stage {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    .frame-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #636e72;
      font-size: 15px;
      background: rgba(240, 244, 255, 0.85);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .frame-loading.show { opacity: 1; }
    .frame-loading .spin {
      width: 28px; height: 28px;
      border: 3px solid #dfe6e9;
      border-top-color: #6c5ce7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 720px) {
      .topbar h1 { font-size: 1.1rem; }
      .tab { padding: 8px 12px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <h1>📚 小学数学互动课件 <span class="sub">· 选个年级开始玩</span></h1>
      <nav class="tabs" id="tabs">
        <button type="button" class="tab active" data-grade="1" data-src="数学一年级/index.html"><span class="emoji">🐻</span>一年级</button>
        <button type="button" class="tab" data-grade="2" data-src="数学二年级/index.html"><span class="emoji">🦊</span>二年级</button>
        <button type="button" class="tab" data-grade="3" data-src="数学三年级/index.html"><span class="emoji">🦁</span>三年级</button>
        <button type="button" class="tab" data-grade="4" data-src="数学四年级/index.html"><span class="emoji">🦅</span>四年级</button>
        <button type="button" class="tab" data-grade="5" data-src="数学五年级/index.html"><span class="emoji">🐯</span>五年级</button>
        <button type="button" class="tab" data-grade="6" data-src="数学六年级/index.html"><span class="emoji">🦉</span>六年级</button>
        <button type="button" class="tab" data-grade="festival" data-src="端午节/index.html"><span class="emoji">🐉</span>端午节</button>
        <button type="button" class="tab" data-grade="area" data-src="数学一年级/area.html"><span class="emoji">📐</span>面积专题</button>
      </nav>
    </div>
  </header>

  <div class="frame-wrap">
    <iframe id="stage" title="数学课件" src="数学一年级/index.html"></iframe>
    <div class="frame-loading" id="loading"><span class="spin"></span>载入中…</div>
  </div>

  <script>
    (function () {
      const tabs = document.querySelectorAll("#tabs .tab");
      const stage = document.getElementById("stage");
      const loading = document.getElementById("loading");

      const STORAGE_KEY = "math-active-grade";

      function activate(btn) {
        tabs.forEach((t) => t.classList.remove("active"));
        btn.classList.add("active");
        loading.classList.add("show");
        stage.src = btn.dataset.src;
        try { localStorage.setItem(STORAGE_KEY, btn.dataset.grade); } catch (_) {}
      }

      tabs.forEach((btn) => {
        btn.addEventListener("click", () => activate(btn));
      });

      stage.addEventListener("load", () => {
        loading.classList.remove("show");
      });

      // 恢复上次选中的 tab
      try {
        const last = localStorage.getItem(STORAGE_KEY);
        if (last) {
          const target = Array.from(tabs).find((t) => t.dataset.grade === last);
          if (target) activate(target);
        }
      } catch (_) {}
    })();
  </script>

</body>
</html>
