<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小学数学互动课件 · 1-6 年级（单页全年级版）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --c1: #ff6b6b;
      --c2: #0984e3;
      --c3: #00b894;
      --c4: #6c5ce7;
      --c5: #e17055;
      --c6: #5f3dc4;
      --bg: #f4f7ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: "Noto Sans SC", system-ui, sans-serif;
      color: #2d3436;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 顶部标题 + 年级 tab */
    .topbar {
      flex: 0 0 auto;
      background: linear-gradient(135deg, #6c5ce7 0%, #5f3dc4 50%, #00cec9 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(108, 92, 231, 0.35);
    }
    .topbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 14px 20px 0;
    }
    .topbar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .topbar h1 {
      font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
      font-size: 1.4rem;
      margin: 0;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar h1 .sub {
      font-size: 0.85rem;
      opacity: 0.85;
      font-family: "Noto Sans SC", sans-serif;
    }
    .topbar .home-link {
      color: #fff;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      font-size: 14px;
      font-weight: 700;
    }
    .topbar .home-link:hover { background: rgba(255, 255, 255, 0.32); }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 12px 12px 0 0;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      border-bottom: 3px solid transparent;
      transition: background 0.18s, transform 0.12s;
    }
    .tab:hover { background: rgba(255, 255, 255, 0.32); }
    .tab.active {
      background: #f0f4ff;
      color: #2d3436;
      border-bottom-color: var(--c4, #6c5ce7);
      transform: translateY(1px);
    }
    .tab .emoji { font-size: 18px; }
    .tab[data-grade="1"].active { color: var(--c1); border-bottom-color: var(--c1); }
    .tab[data-grade="2"].active { color: var(--c2); border-bottom-color: var(--c2); }
    .tab[data-grade="3"].active { color: var(--c3); border-bottom-color: var(--c3); }
    .tab[data-grade="4"].active { color: var(--c4); border-bottom-color: var(--c4); }
    .tab[data-grade="5"].active { color: var(--c5); border-bottom-color: var(--c5); }
    .tab[data-grade="6"].active { color: var(--c6); border-bottom-color: var(--c6); }
    .tab[data-grade="festival"].active { color: #c0392b; border-bottom-color: #c0392b; }
    .tab[data-grade="area"].active { color: #fd79a8; border-bottom-color: #fd79a8; }

    /* iframe 容器 */
    .frame-wrap {
      flex: 1 1 auto;
      background: #fff;
      min-height: 0;
      position: relative;
    }
    iframe#stage {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #636e72;
      font-size: 14px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .loading.hide { opacity: 0; }

    @media (max-width: 640px) {
      .topbar h1 { font-size: 1.1rem; }
      .tab { padding: 8px 12px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-head">
        <h1>
          📚 小学数学互动课件
          <span class="sub">1-6 年级 · 单页全年级版 · 无需验证码</span>
        </h1>
        <a class="home-link" href="index.html" target="_top">🏠 简洁版首页</a>
      </div>
      <nav class="tabs" id="tabs">
        <button class="tab" type="button" data-grade="1" data-src="数学一年级/index.html">
          <span class="emoji">🐻</span> 一年级 <small style="opacity:.75;font-weight:500">10 关</small>
        </button>
        <button class="tab" type="button" data-grade="2" data-src="数学二年级/index.html">
          <span class="emoji">🦊</span> 二年级 <small style="opacity:.75;font-weight:500">17 关</small>
        </button>
        <button class="tab" type="button" data-grade="3" data-src="数学三年级/index.html">
          <span class="emoji">🐰</span> 三年级 <small style="opacity:.75;font-weight:500">16 关</small>
        </button>
        <button class="tab" type="button" data-grade="4" data-src="数学四年级/index.html">
          <span class="emoji">🦁</span> 四年级 <small style="opacity:.75;font-weight:500">16 关</small>
        </button>
        <button class="tab" type="button" data-grade="5" data-src="数学五年级/index.html">
          <span class="emoji">🐯</span> 五年级 <small style="opacity:.75;font-weight:500">16 关</small>
        </button>
        <button class="tab" type="button" data-grade="6" data-src="数学六年级/index.html">
          <span class="emoji">🐼</span> 六年级 <small style="opacity:.75;font-weight:500">16 关</small>
        </button>
        <button class="tab" type="button" data-grade="festival" data-src="端午节/index.html">
          <span class="emoji">🐉</span> 端午节 <small style="opacity:.75;font-weight:500">2 关</small>
        </button>
        <button class="tab" type="button" data-grade="area" data-src="数学一年级/area.html">
          <span class="emoji">📐</span> 面积专题 <small style="opacity:.75;font-weight:500">2 关</small>
        </button>
      </nav>
    </div>
  </header>

  <div class="frame-wrap">
    <div class="loading" id="loading">加载中…</div>
    <iframe id="stage" title="课件" allow="fullscreen"></iframe>
  </div>

  <script>
    (function () {
      const tabs = Array.from(document.querySelectorAll(".tab"));
      const stage = document.getElementById("stage");
      const loading = document.getElementById("loading");

      // 记住上次选中的 tab
      const KEY = "math.activeGrade";
      const saved = localStorage.getItem(KEY);
      const initial = tabs.find(t => t.dataset.grade === saved) || tabs[0];

      // 当前已激活的 tab；用 tab 引用直接比较，避免 basename 撞车（所有年级都是 index.html）
      let currentTab = null;
      let loadTimer = null;

      function activate(tab) {
        if (!tab) return;
        tabs.forEach(t => t.classList.toggle("active", t === tab));
        // 只有真正切换年级时才重新加载 iframe
        if (currentTab !== tab) {
          loading.classList.remove("hide");
          currentTab = tab;
          // 兜底：3 秒后无论是否触发 load，都把 loading 隐藏（避免一直转圈）
          clearTimeout(loadTimer);
          loadTimer = setTimeout(() => loading.classList.add("hide"), 3000);
          // 直接给 iframe 赋新 src，浏览器会自动加载
          stage.src = tab.dataset.src;
        }
        localStorage.setItem(KEY, tab.dataset.grade);
        try { window.scrollTo({ top: 0 }); } catch (e) { /* noop */ }
      }

      tabs.forEach(t => {
        t.addEventListener("click", e => {
          e.preventDefault();
          activate(t);
        });
      });

      stage.addEventListener("load", () => {
        if (!stage.src) return;
        loading.classList.add("hide");
      });

      activate(initial);
    })();
  </script>
</body>
</html>
