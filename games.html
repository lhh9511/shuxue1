<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小学数学小游戏 · 1-6 年级</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f7ff;
      --surface: #ffffff;
      --text: #2d3436;
      --muted: #636e72;
      --border: #e3e8ef;
      --shadow: 0 2px 8px rgba(45, 52, 54, 0.08);
      --font-display: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
      --font-body: "Noto Sans SC", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(circle at 8% 12%, rgba(108, 92, 231, 0.12), transparent 40%),
        radial-gradient(circle at 92% 88%, rgba(0, 206, 201, 0.10), transparent 42%);
      min-height: 100vh;
      font-size: 16px;
    }

    .topbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 12px;
      text-align: center;
    }
    .topbar h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      margin: 0 0 6px;
      color: #6c5ce7;
      font-weight: 400;
    }
    .topbar p {
      margin: 0;
      color: var(--muted);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 20px 60px;
    }

    .grade-section { margin-top: 28px; }
    .grade-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .grade-head .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .grade-head h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      margin: 0;
      color: var(--text);
      font-weight: 400;
    }
    .grade-head .count {
      color: var(--muted);
      font-size: 13px;
      margin-left: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    a.game {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      padding: 12px 14px;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      border: 2px solid transparent;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
    }
    a.game:hover {
      transform: translateY(-1px);
      border-color: var(--accent, #6c5ce7);
    }
    a.game .emoji {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: var(--accent, #6c5ce7);
      color: #fff;
    }
    a.game .name {
      flex: 1;
      min-width: 0;
      font-weight: 500;
      font-size: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    a.game .idx {
      font-size: 11px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    /* 各年级主题色 */
    .g1 { --accent: #ff6b6b; }
    .g2 { --accent: #0984e3; }
    .g3 { --accent: #00b894; }
    .g4 { --accent: #6c5ce7; }
    .g5 { --accent: #e17055; }
    .g6 { --accent: #5f3dc4; }
    .gf { --accent: #c0392b; }
    .ga { --accent: #fd79a8; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 20px;
    }

    @media (max-width: 520px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .topbar h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <h1>📚 小学数学小游戏</h1>
    <p>1-6 年级 · 共 96 关 · 点哪个玩哪个，无需验证码</p>
  </header>

  <main class="container" id="root">
    <!-- JS 渲染 -->
  </main>

  <footer>🏠 <a href="index.html" style="color:inherit">简洁版首页</a></footer>

  <script>
    const GAMES = {
      g1: {
        label: "一年级", count: 10, base: "数学一年级/",
        items: [
          ["counting",  "数一数",      "🍎"],
          ["compare",   "比一比",      "⚖️"],
          ["sort",      "分一分",      "🧺"],
          ["position",  "认位置",      "🧭"],
          ["numbers",   "10 以内的数",  "🔢"],
          ["shapes",    "认识图形",    "🔷"],
          ["clock",     "认识钟表",    "🕐"],
          ["addsub",    "加减法",      "➕"],
          ["pattern",   "找规律",      "🌈"],
          ["area",      "认识面积",    "📐", "数学一年级/area.html"],
        ],
      },
      g2: {
        label: "二年级", count: 17, base: "数学二年级/",
        items: [
          ["hundred",    "100 以内的数",  "💯"],
          ["compare100", "比大小",       "⚖️"],
          ["carryAdd",   "进位加法",     "⬆️"],
          ["borrowSub",  "退位减法",     "⬇️"],
          ["multiply",   "表内乘法",     "✖️"],
          ["divide",     "表内除法",     "➗"],
          ["remainder",  "有余数除法",   "🍪"],
          ["mixed",      "加减混合",     "➕"],
          ["money",      "认识人民币",   "💰"],
          ["length",     "长度单位",     "📏"],
          ["weight",     "质量单位",     "⚖️"],
          ["shapes2",    "认识图形",     "🔶"],
          ["angle",      "认识角",       "📐"],
          ["symmetry",   "图形对称",     "🦋"],
          ["stats",      "简单统计",     "📊"],
          ["clock2",     "认识时间",     "🕐"],
          ["pattern2",   "找规律",       "🌈"],
        ],
      },
      g3: {
        label: "三年级", count: 16, base: "数学三年级/",
        items: [
          ["bigAddSub",  "万以内加减法",   "🧮"],
          ["mulOne",     "多位数×一位数",  "✖️"],
          ["divOne",     "除数是一位数",   "➗"],
          ["multiple",   "倍的认识",       "🔁"],
          ["perimeter",  "周长",           "🔲"],
          ["areaG3",     "面积",           "🟦"],
          ["fraction",   "分数初步",       "🍕"],
          ["decimal",    "小数初步",       "💧"],
          ["timeUnit",   "时分秒",         "⏱️"],
          ["kmTon",      "千米与吨",       "🚛"],
          ["measure",    "毫米与分米",     "📏"],
          ["ymd",        "年月日",         "📅"],
          ["clock24",    "24 时计时法",    "🕓"],
          ["direction",  "位置与方向",     "🧭"],
          ["chance",     "可能性",         "🎲"],
          ["venn",       "集合",           "⭕"],
        ],
      },
      g4: {
        label: "四年级", count: 16, base: "数学四年级/",
        items: [
          ["bigNumber",     "大数的认识",       "🔢"],
          ["mul2x3",        "三位数×两位数",    "✖️"],
          ["div2",          "除数是两位数",     "➗"],
          ["areaBig",       "公顷与平方千米",   "🌾"],
          ["angle4",        "角的度量",         "📐"],
          ["parallel",      "平行四边形和梯形", "🔷"],
          ["ops4",          "四则运算顺序",     "🧠"],
          ["lawAdd",        "加法运算定律",     "🔁"],
          ["lawMul",        "乘法运算定律",     "🪄"],
          ["decimalMean",   "小数的意义",       "💠"],
          ["decimalAddSub", "小数加减法",       "➕"],
          ["triangle",      "三角形",           "🔺"],
          ["view",          "观察物体",         "👀"],
          ["lineChart",     "折线统计图",       "📈"],
          ["chicken",       "鸡兔同笼",         "🐔"],
          ["average",       "平均数",           "📊"],
        ],
      },
      g5: {
        label: "五年级", count: 16, base: "数学五年级/",
        items: [
          ["decMul",       "小数乘法",       "✖️"],
          ["decDiv",       "小数除法",       "➗"],
          ["position",     "位置（数对）",   "📍"],
          ["equation",     "简易方程",       "📐"],
          ["polyArea",     "多边形面积",     "🔷"],
          ["tree",         "植树问题",       "🌳"],
          ["chance5",      "可能性",         "🎲"],
          ["factor",       "因数与倍数",     "🔢"],
          ["divFeat",      "倍数的特征",     "🧪"],
          ["prime",        "质数与合数",     "🧱"],
          ["volume",       "长方体与正方体", "🧊"],
          ["fracMean",     "分数的意义",     "🍰"],
          ["reduceCommon", "约分与通分",     "🧮"],
          ["fracAddSub",   "分数加减法",     "➕"],
          ["lineChart5",   "折线统计图",     "📈"],
          ["defective",    "找次品",         "🔍"],
        ],
      },
      g6: {
        label: "六年级", count: 16, base: "数学六年级/",
        items: [
          ["fracMul",      "分数乘法",       "✖️"],
          ["fracDiv",      "分数除法",       "➗"],
          ["ratio",        "比",             "🔗"],
          ["circlePeri",   "圆的周长",       "⭕"],
          ["circleArea",   "圆的面积",       "🟠"],
          ["percentConv",  "百分数互化",     "💯"],
          ["discount",     "折扣与成数",     "🏷️"],
          ["interest",     "利率（利息）",   "🏦"],
          ["negative",     "负数",           "🌡️"],
          ["cylinderSurf", "圆柱表面积",     "🥫"],
          ["cylinderVol",  "圆柱体积",       "🧊"],
          ["coneVol",      "圆锥体积",       "🍦"],
          ["proportion",   "正比例与反比例", "⚖️"],
          ["solveProp",    "解比例",         "🧮"],
          ["pieChart",     "扇形统计图",     "📊"],
          ["pigeon",       "鸽巢问题",       "🐦"],
        ],
      },
      gf: {
        label: "🐉 端午节", count: 2, base: "端午节/",
        items: [
          ["zongzi", "包粽子工坊", "🍙", "端午节/index.html#zongzi"],
          ["race",   "龙舟竞渡",   "🐉", "端午节/index.html#race"],
        ],
      },
      ga: {
        label: "📐 面积专题", count: 2, base: "数学一年级/",
        items: [
          ["learn",  "密铺探究", "🟦", "数学一年级/area.html#panel-learn"],
          ["compare","面积比较", "⚖️", "数学一年级/area.html#panel-compare"],
        ],
      },
    };

    const root = document.getElementById("root");
    let totalCount = 0;

    for (const [key, g] of Object.entries(GAMES)) {
      const sec = document.createElement("section");
      sec.className = `grade-section ${key}`;
      sec.innerHTML = `
        <div class="grade-head">
          <span class="dot"></span>
          <h2>${g.label}</h2>
          <span class="count">共 ${g.items.length} 个游戏</span>
        </div>
        <div class="grid"></div>
      `;
      sec.querySelector(".dot").style.background = `var(--accent)`;
      const grid = sec.querySelector(".grid");
      g.items.forEach((it, i) => {
        const [id, title, emoji, customHref] = it;
        const href = customHref || `${g.base}#${id}`;
        const a = document.createElement("a");
        a.className = "game";
        a.href = href;
        a.innerHTML = `
          <span class="emoji">${emoji}</span>
          <span class="name">${title}</span>
          <span class="idx">${i + 1}</span>
        `;
        grid.appendChild(a);
        totalCount++;
      });
      root.appendChild(sec);
    }

    document.querySelector(".topbar p").textContent =
      `1-6 年级 · 共 ${totalCount} 个游戏 · 点哪个玩哪个，无需验证码`;
  </script>

</body>
</html>
